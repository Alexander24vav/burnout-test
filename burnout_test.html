<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тест на выгорание · Екатерина Волкова</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7F77DD;
  --purple-light: #EEEDFE;
  --purple-mid: #AFA9EC;
  --purple-dark: #3C3489;
  --coral: #D85A30;
  --amber: #BA7517;
  --green: #1D9E75;
  --bg: #F7F6FF;
  --card: #FFFFFF;
  --text: #1a1825;
  --text-muted: #6b6882;
  --border: rgba(127,119,221,0.18);
  --radius: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #13121f;
    --card: #1e1c2e;
    --text: #f0effe;
    --text-muted: #9b97bf;
    --border: rgba(175,169,236,0.15);
    --purple-light: rgba(127,119,221,0.15);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}

.screen { display: none; }
.screen.active { display: block; }
#quiz { flex-direction: column; }
#quiz.active { display: flex !important; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── INTRO ── */
#intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem 2rem;
  text-align: center;
}
#intro .badge {
  display: inline-block;
  background: var(--purple-light);
  color: var(--purple-dark);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 1.25rem;
}
#intro h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 22px;
  font-weight: 500;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 1rem;
}
#intro h1 span { color: var(--purple); }
#intro p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 300px;
  margin-bottom: 2rem;
}
.meta-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 2.5rem;
}
.meta-pill {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.meta-pill b { color: var(--text); font-weight: 600; }
.start-btn {
  width: 100%;
  max-width: 320px;
  padding: 16px;
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Mulish', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.start-btn:active { transform: scale(0.98); background: var(--purple-dark); }

/* ── QUIZ ── */
#quiz { padding: 0; min-height: 100vh; flex-direction: column; }

.quiz-top {
  padding: 1.25rem 1.25rem 1rem;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.prog-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.prog-pct { font-size: 11px; color: var(--purple); font-weight: 600; }
.pbar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pfill { height: 4px; background: var(--purple); border-radius: 2px; transition: width 0.4s ease; }

.quiz-body { flex: 1; padding: 0.5rem 1.25rem 1.5rem; }
.q-category {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 8px;
}
.q-text {
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 1.5rem;
  font-weight: 500;
}
.opts { display: flex; flex-direction: column; gap: 9px; }
.opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: all 0.15s;
}
.opt:active { transform: scale(0.99); }
.opt.sel {
  border-color: var(--purple);
  background: var(--purple-light);
  color: var(--purple-dark);
}
.radio {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.opt.sel .radio { background: var(--purple); border-color: var(--purple); }
.radio-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity 0.15s;
}
.opt.sel .radio-dot { opacity: 1; }

.quiz-nav {
  padding: 1rem 1.25rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.nav-btn {
  padding: 13px 20px;
  border-radius: 12px;
  font-family: 'Mulish', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-muted);
  transition: all 0.15s;
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn.pri {
  flex: 1;
  background: var(--purple);
  color: #fff;
  border-color: var(--purple);
}
.nav-btn.pri:disabled { background: var(--border); border-color: transparent; color: var(--text-muted); cursor: not-allowed; transform: none; }
.nav-btn.sec:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── RESULT ── */
#result { padding: 1.5rem 1.25rem 2rem; min-height: 100vh; }

.res-top { text-align: center; margin-bottom: 1.5rem; }
.res-icon {
  width: 64px; height: 64px;
  border-radius: 20px;
  margin: 0 auto 1rem;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.res-level {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 10px;
}
.res-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.35;
}
.res-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}

.dims-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.dims-card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.dim-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.dim-row:last-child { margin-bottom: 0; }
.dim-lbl { font-size: 12px; color: var(--text-muted); width: 115px; flex-shrink: 0; line-height: 1.3; }
.dim-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.dim-fill { height: 8px; border-radius: 4px; width: 0; transition: width 1.2s cubic-bezier(.22,1,.36,1); }
.dim-val { font-size: 12px; font-weight: 600; width: 34px; text-align: right; }

.recs-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.recs-card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.rec-item {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}
.rec-item:last-child { margin-bottom: 0; }
.rec-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple-mid);
  flex-shrink: 0;
  margin-top: 7px;
}

.brand-footer {
  text-align: center;
  padding: 0.5rem 0 0;
  font-size: 11px;
  color: var(--text-muted);
}
.brand-footer b { color: var(--purple); font-weight: 600; }

.restart-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'Mulish', sans-serif;
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  margin-top: 1rem;
  transition: all 0.15s;
}
.restart-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="badge">Екатерина Волкова · Психолог</div>
  <h1>Тест на <span>эмоциональное</span> выгорание</h1>
  <p>Профессиональная диагностика по методике Кристины Маслах — мировому стандарту оценки выгорания</p>
  <div class="meta-row">
    <div class="meta-pill"><b>16</b> вопросов</div>
    <div class="meta-pill"><b>5</b> минут</div>
    <div class="meta-pill"><b>3</b> шкалы</div>
  </div>
  <button class="start-btn" id="startBtn">Начать тест →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-top">
    <div class="progress-row">
      <span class="prog-label" id="ql">Вопрос 1 из 16</span>
      <span class="prog-pct" id="qpct">0%</span>
    </div>
    <div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="q-category" id="qcat"></div>
    <div class="q-text" id="qt"></div>
    <div class="opts" id="opts"></div>
  </div>
  <div class="quiz-nav">
    <button class="nav-btn sec" id="bk" onclick="back()">← Назад</button>
    <button class="nav-btn pri" id="nx" onclick="next()">Далее →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res-top">
    <div class="res-icon" id="ri"></div>
    <div class="res-level" id="rl"></div>
    <div class="res-title" id="rt"></div>
    <div class="res-desc" id="rd"></div>
  </div>
  <div class="dims-card">
    <div class="dims-card-title">Показатели по шкалам</div>
    <div id="dims"></div>
  </div>
  <div class="recs-card">
    <div class="recs-card-title">Рекомендации</div>
    <div id="recs"></div>
  </div>
  <div class="brand-footer">Составлено для клиентов <b>Екатерины Волковой</b></div>
  <button class="restart-btn" onclick="restart()">Пройти тест заново</button>
</div>

<script>
try { window.Telegram.WebApp.expand(); } catch(e) {}

// Кнопка старта — и click и touchend для Telegram
var sb = document.getElementById('startBtn');
sb.addEventListener('click', function(e){ e.preventDefault(); startQuiz(); });
sb.addEventListener('touchend', function(e){ e.preventDefault(); startQuiz(); });

const LBLS = ['Никогда','Очень редко','Редко','Иногда','Часто','Очень часто','Каждый день'];
const CATS = { EE: 'Эмоциональное истощение', DP: 'Деперсонализация', PA: 'Личные достижения' };
const QS = [
  {t:'EE',r:0,q:'Я чувствую себя эмоционально опустошённым(ой) от своей работы.'},
  {t:'EE',r:0,q:'К концу рабочего дня я чувствую себя как выжатый лимон.'},
  {t:'EE',r:0,q:'Я чувствую усталость, когда встаю утром и понимаю, что снова предстоит рабочий день.'},
  {t:'DP',r:0,q:'Я могу легко понять, как чувствуют себя мои клиенты или коллеги.'},
  {t:'DP',r:0,q:'Я чувствую, что обращаюсь с некоторыми людьми как с безликими объектами.'},
  {t:'EE',r:0,q:'Работа с людьми целый день действительно утомляет меня.'},
  {t:'PA',r:1,q:'Я эффективно справляюсь с проблемами своих клиентов и коллег.'},
  {t:'EE',r:0,q:'Я чувствую себя измотанным(ой) от своей работы.'},
  {t:'PA',r:1,q:'Я чувствую, что благодаря своей работе позитивно влияю на жизнь других людей.'},
  {t:'DP',r:0,q:'Я стал(а) более чёрствым(ой) к людям с тех пор, как занялся(лась) этой работой.'},
  {t:'DP',r:0,q:'Я беспокоюсь, что эта работа делает меня эмоционально жёстче.'},
  {t:'PA',r:1,q:'Я чувствую себя очень энергичным(ой) на работе.'},
  {t:'EE',r:0,q:'Я чувствую разочарование в своей работе.'},
  {t:'EE',r:0,q:'Я считаю, что слишком много работаю.'},
  {t:'DP',r:0,q:'Я не особо интересуюсь тем, что происходит с некоторыми клиентами.'},
  {t:'PA',r:1,q:'Непосредственная работа с людьми создаёт слишком много стресса для меня.'},
];

let ans = new Array(16).fill(null), cur = 0;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  var el = document.getElementById(id);
  el.classList.add('active');
}

function startQuiz() { show('quiz'); render(); }

function render() {
  var q = QS[cur];
  document.getElementById('ql').textContent = 'Вопрос ' + (cur+1) + ' из 16';
  document.getElementById('qpct').textContent = Math.round(cur/16*100) + '%';
  document.getElementById('pf').style.width = (cur/16*100) + '%';
  document.getElementById('qcat').textContent = CATS[q.t];
  document.getElementById('qt').textContent = q.q;

  var o = document.getElementById('opts');
  o.innerHTML = '';
  LBLS.forEach(function(l, i) {
    var d = document.createElement('div');
    d.className = 'opt' + (ans[cur] === i ? ' sel' : '');
    d.innerHTML = '<div class="radio"><div class="radio-dot"></div></div><span>' + l + '</span>';
    d.onclick = (function(ii){ return function(){ ans[cur]=ii; render(); }; })(i);
    o.appendChild(d);
  });

  document.getElementById('bk').disabled = cur === 0;
  var nb = document.getElementById('nx');
  nb.disabled = ans[cur] === null;
  nb.textContent = cur === 15 ? 'Узнать результат →' : 'Далее →';
}

function next() { if (cur < 15) { cur++; render(); } else showResult(); }
function back() { if (cur > 0) { cur--; render(); } }
function restart() { ans = new Array(16).fill(null); cur = 0; show('quiz'); render(); }

function showResult() {
  var EE=0,DP=0,PA=0,EEn=0,DPn=0,PAn=0;
  QS.forEach(function(q,i){
    var v = ans[i]||0, s = q.r ? (6-v) : v;
    if(q.t==='EE'){EE+=s;EEn++;}
    else if(q.t==='DP'){DP+=s;DPn++;}
    else{PA+=s;PAn++;}
  });
  var eePct = Math.round(EE/(EEn*6)*100);
  var dpPct = Math.round(DP/(DPn*6)*100);
  var paPct = Math.round(PA/(PAn*6)*100);
  var score = Math.round((eePct + dpPct + (100-paPct)) / 3);

  show('result');

  var cfg;
  if (score < 25) {
    cfg = {
      icon:'🌿', iconBg:'#EAF3DE',
      level:'Низкий уровень', levelBg:'#EAF3DE', levelC:'#3B6D11',
      title:'Выгорания не выявлено',
      desc:'Ваши показатели в норме. Вы хорошо справляетесь с эмоциональной нагрузкой и сохраняете ресурсное состояние.',
      recs:['Поддерживайте текущий баланс: регулярный отдых, физическая активность, качественный сон.','Продолжайте практики осознанности — они сохраняют устойчивость долгосрочно.','Проходите тест раз в 3–6 месяцев для мониторинга состояния.']
    };
  } else if (score < 50) {
    cfg = {
      icon:'🌤', iconBg:'#FAEEDA',
      level:'Умеренный уровень', levelBg:'#FAEEDA', levelC:'#854F0B',
      title:'Начальные признаки выгорания',
      desc:'Есть первые тревожные сигналы. Сейчас важно не игнорировать их — ситуация ещё легко поддаётся коррекции.',
      recs:['Пересмотрите баланс работы и отдыха, установите чёткие границы рабочего времени.','Добавьте ежедневные восстановительные паузы: прогулки, дыхательные практики.','Обратите внимание на качество сна и питания — они напрямую влияют на эмоциональный ресурс.','Рекомендую встречу с психологом для разбора источников стресса.']
    };
  } else if (score < 70) {
    cfg = {
      icon:'🌧', iconBg:'#FAECE7',
      level:'Высокий уровень', levelBg:'#FAECE7', levelC:'#993C1D',
      title:'Выраженное выгорание',
      desc:'Выгорание уже влияет на вашу профессиональную и личную жизнь. Необходимо принять меры по восстановлению.',
      recs:['Срочно снизьте нагрузку: делегируйте задачи, возьмите дополнительные выходные.','Психологическая поддержка обязательна — запишитесь на консультацию как можно скорее.','Временно ограничьте контакты, которые истощают вас эмоционально.','Сосредоточьтесь на базовых потребностях: сон 8+ часов, питание, движение.']
    };
  } else {
    cfg = {
      icon:'⛈', iconBg:'#FCEBEB',
      level:'Критический уровень', levelBg:'#FCEBEB', levelC:'#A32D2D',
      title:'Тяжёлая стадия выгорания',
      desc:'Ваши показатели говорят о тяжёлом выгорании. Это состояние требует профессиональной помощи.',
      recs:['Обратитесь за профессиональной психологической помощью — это необходимость.','Рассмотрите временный отпуск или смену режима работы.','Проконсультируйтесь с врачом: выгорание этой степени часто сопровождается физическими симптомами.','Опирайтесь на близких — не изолируйтесь, расскажите о своём состоянии.']
    };
  }

  var ri = document.getElementById('ri');
  ri.textContent = cfg.icon;
  ri.style.background = cfg.iconBg;

  var rl = document.getElementById('rl');
  rl.textContent = cfg.level;
  rl.style.background = cfg.levelBg;
  rl.style.color = cfg.levelC;

  document.getElementById('rt').textContent = cfg.title;
  document.getElementById('rd').textContent = cfg.desc;

  var dims = document.getElementById('dims');
  dims.innerHTML = '';
  [
    {lbl:'Эмоц. истощение', pct:eePct, c:'#D85A30'},
    {lbl:'Деперсонализация', pct:dpPct, c:'#BA7517'},
    {lbl:'Личн. достижения', pct:paPct, c:'#1D9E75'},
  ].forEach(function(r){
    dims.innerHTML += '<div class="dim-row"><div class="dim-lbl">'+r.lbl+'</div><div class="dim-track"><div class="dim-fill" id="df'+r.lbl+'" style="background:'+r.c+'"></div></div><div class="dim-val" style="color:'+r.c+'">'+r.pct+'%</div></div>';
  });

  setTimeout(function(){
    document.querySelectorAll('.dim-fill').forEach(function(el, i){
      var pcts = [eePct, dpPct, paPct];
      el.style.width = pcts[i] + '%';
    });
  }, 100);

  var recs = document.getElementById('recs');
  recs.innerHTML = '';
  cfg.recs.forEach(function(r){
    recs.innerHTML += '<div class="rec-item"><div class="rec-dot"></div><span>'+r+'</span></div>';
  });

  try {
    window.Telegram.WebApp.MainButton.setText('Записаться к Екатерине');
    window.Telegram.WebApp.MainButton.show();
    window.Telegram.WebApp.MainButton.onClick(function(){
      window.Telegram.WebApp.openTelegramLink('https://t.me/Katya_Volkova16');
    });
